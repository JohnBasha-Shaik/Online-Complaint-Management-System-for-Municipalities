server:
  port: 8084

spring:
  application:
    name: notification-service
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME:your-email@gmail.com}
    password: ${EMAIL_PASSWORD:your-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

notification:
  sms:
    api-key: ${SMS_API_KEY:your-sms-api-key}
    api-url: ${SMS_API_URL:https://api.sms-provider.com/send}

management:
  endpoints:
    web:
      exposure:
        include: health,info