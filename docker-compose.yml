version: '3.8'

services:
  # MySQL Database for User Service
  user-db:
    image: mysql:8.0
    container_name: user-db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: user_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - user_db_data:/var/lib/mysql
    networks:
      - municipality-network

  # MySQL Database for Complaint Service
  complaint-db:
    image: mysql:8.0
    container_name: complaint-db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: complaint_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3308:3306"
    volumes:
      - complaint_db_data:/var/lib/mysql
    networks:
      - municipality-network

  # MySQL Database for Department Service
  department-db:
    image: mysql:8.0
    container_name: department-db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: department_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3309:3306"
    volumes:
      - department_db_data:/var/lib/mysql
    networks:
      - municipality-network

  # Redis for API Gateway Rate Limiting
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - municipality-network

  # Eureka Server
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - municipality-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Config Server
  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - municipality-network
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API Gateway
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      config-server:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - municipality-network
    environment:
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_REDIS_HOST=redis

  # User Service
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8081:8081"
    depends_on:
      config-server:
        condition: service_healthy
      user-db:
        condition: service_started
    networks:
      - municipality-network
    environment:
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_DATASOURCE_URL=jdbc:mysql://user-db:3306/user_db

  # Complaint Service
  complaint-service:
    build: ./complaint-service
    container_name: complaint-service
    ports:
      - "8082:8082"
    depends_on:
      config-server:
        condition: service_healthy
      complaint-db:
        condition: service_started
    networks:
      - municipality-network
    environment:
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_DATASOURCE_URL=jdbc:mysql://complaint-db:3306/complaint_db

  # Department Service
  department-service:
    build: ./department-service
    container_name: department-service
    ports:
      - "8083:8083"
    depends_on:
      config-server:
        condition: service_healthy
      department-db:
        condition: service_started
    networks:
      - municipality-network
    environment:
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_DATASOURCE_URL=jdbc:mysql://department-db:3306/department_db

  # Notification Service
  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8084:8084"
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - municipality-network
    environment:
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka

volumes:
  user_db_data:
  complaint_db_data:
  department_db_data:

networks:
  municipality-network:
    driver: bridge