# API Gateway Configuration
spring.application.name=api-gateway
server.port=8080

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Gateway Routes Configuration
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=2

spring.cloud.gateway.routes[1].id=complaint-service
spring.cloud.gateway.routes[1].uri=lb://complaint-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/complaints/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=2

spring.cloud.gateway.routes[2].id=department-service
spring.cloud.gateway.routes[2].uri=lb://department-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/departments/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=2

spring.cloud.gateway.routes[3].id=notification-service
spring.cloud.gateway.routes[3].uri=lb://notification-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/notifications/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=2

# Circuit Breaker Configuration
spring.cloud.gateway.default-filters=Retry,CircuitBreaker

# JWT Configuration
jwt.secret=mySecretKey123456789012345678901234567890
jwt.expiration=86400000

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.com.municipality.gateway=DEBUG