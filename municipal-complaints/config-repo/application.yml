security:
  jwt:
    # 256-bit base64 secret (example ONLY; replace in production)
    secret: VGhpc0lzQVBsYWNlSG9sZGVyMzI1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=
    expiration-seconds: 3600

spring:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

management:
  endpoints:
    web:
      exposure:
        include: health,info
logging:
  level:
    org.springframework.security: INFO